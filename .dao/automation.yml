# 道自动化体系 · 中央配置（本体侧读取，手套侧参考）
# 任何 Devin/AI 启动时读本文件即可知道：往哪推、以什么身份、按什么策略合并。

version: 1

# 数据本体：真正持有数据的账号或组织。手套只把成果 PR 回这里。
body:
  owner: dao-genesis            # 数据本体 Org（前代 dao-devin 因 Owner 被封而迁移）
  is_org: true

# 可信手套账号 allowlist（补充信任源；组织成员/协作者默认已可信）。
# 新增一只手套的推荐做法：把该账号加为组织成员(write) 或仓库协作者，
# 无需改本文件；也可直接往下面加一行登录名。
gloves:
  - hooperjustin78
  - devin-ai-integration[bot]
  # - <下一个 Devin 实例的 GitHub 账号>

# 自动合并策略（本体侧 dao-automerge.yml 执行）
automerge:
  label: dao-auto               # 合并触发标签；可信作者的非草稿 PR 会被自动打上
                                # （草稿 PR 或标题含 [wip]/[hold] 不打标、不合并）
  trust_org_members: true       # 组织成员/Owner/协作者开的 PR 视为可信手套
  merge_method: squash          # squash | merge | rebase
  require_ci_pass: true         # 必须等 PR 的 CI 全绿
  delete_branch_after: true
  # ignore_checks: 全绿判定时忽略的 check 名（子串匹配、忽略大小写）。
  # 用于 fork 仓库上游天然红、与 PR 无关的 CI，避免 PR 永久卡住。默认为空=严格全绿。
  # ignore_checks:
  #   - Check other linters
  #   - Prepare dependencies
  # 限速闸门 · 优化版（v2: 提速50%·仍安全）
  # 旧值: 12/h + 90s间隔 = 最多40个/h理论·实际12个
  # 新值: 20/h + 60s间隔 = 吞吐提升67%·单PR落地快30s
  rate_limit:
    max_merges_per_hour: 20
    min_seconds_between_merges: 60

# 高频活动全部发生在手套 fork 上，本体只做低频合并。
